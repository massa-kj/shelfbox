name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  # Runs the release-target build matrix and uploads short-lived artifacts
  # without creating a GitHub release. Use this against the release candidate
  # before pushing the version tag.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: shelfbox

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-2025

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --bin shelfbox --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --locked --bin shelfbox --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          staging="shelfbox-${{ github.ref_name }}-${{ matrix.target }}"
          binary="shelfbox"
          asset="${staging}.tar.gz"

          if [[ "${{ matrix.target }}" == *windows* ]]; then
            binary="shelfbox.exe"
            asset="${staging}.zip"
          fi

          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${binary}" "$staging/"
          cp README.md LICENSE "$staging/"

          if [[ "${{ matrix.target }}" == *windows* ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path '${staging}' -DestinationPath '${asset}'"
          else
            tar czf "${asset}" "$staging"
          fi

          echo "ASSET=${asset}" >> "$GITHUB_ENV"

      - name: Generate checksum
        shell: bash
        run: |
          sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
